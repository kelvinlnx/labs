secrets:
  rules:
    - id: high-entropy-token
      description: "Detected a string with high randomness"
      # This looks for strings roughly 20-100 chars long
      regex: '[A-Za-z0-9+/=]{20,100}' 
      # Entropy scale is usually 0.0 to 8.0. 
      # 3.5 to 4.5 is the "sweet spot" for Base64/Hex secrets.
      entropy: 3.5
      keywords:
        - "token"
        - "secret"
        - "key"
  
