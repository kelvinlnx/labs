# Add these lines to your existing loki-values.yaml
loki:
  # Ensure scalable targets are disabled
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
  storage:
    type: "filesystem"  # or "s3" if using MinIO
    bucketNames:
      chunks: "loki-chunks"
      ruler: "loki-ruler"
      admin: "loki-admin"
  
  # Keep your existing config
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# Rest of your existing config...
persistence:
  enabled: true
  storageClassName: "nfs-client"
  size: 10Gi

deploymentMode: SingleBinary
