apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: image-registry
spec:
  selector:
    app: docker-registry
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: image-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      nodeSelector:
        image-registry: "true"
      containers:
      - name: registry
        image: registry:2
        ports:
        - containerPort: 5000
          hostPort: 5000     # this binds to host port
        env:
        - name: REGISTRY_HTTP_TLS_CERTIFICATE
          value: /certs/tls.crt
        - name: REGISTRY_HTTP_TLS_KEY
          value: /certs/tls.key
        volumeMounts:
        - name: registry-data
          mountPath: /var/lib/registry
        - name: certs
          mountPath: /certs
          readOnly: true
      volumes:
      - name: registry-data
        emptyDir: {} # Use a PVC here for production-like persistence
      - name: certs
        secret:
          secretName: registry-tls
