apiVersion: v1 
kind: LimitRange
metadata:
  name: redis-limits 
  namespace: redis
spec:
  limits:
  - max:
      cpu: "1"
      memory: "512Mi"
    min:
      cpu: "100m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "250m" 
      memory: "128Mi"
    type: Container 

